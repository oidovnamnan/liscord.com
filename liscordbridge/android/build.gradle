buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 26
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.9.10"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10")
    }
}

allprojects {
    repositories {
        maven {
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        google()
        maven { url "https://www.jitpack.io" }
        mavenCentral()
    }
}

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            // Fix missing namespace for older libraries in Gradle 8+
            if (project.android.namespace == null) {
                project.android.namespace = project.group ?: "com.liscord.fallback.${project.name}"
            }
            // Fix old compileSdkVersion/targetSdkVersion/buildToolsVersion
            project.android {
                compileSdkVersion rootProject.ext.compileSdkVersion
                buildToolsVersion rootProject.ext.buildToolsVersion
                defaultConfig {
                    if (it.hasProperty("targetSdkVersion")) {
                        targetSdkVersion rootProject.ext.targetSdkVersion
                    }
                    if (it.hasProperty("minSdkVersion")) {
                        minSdkVersion rootProject.ext.minSdkVersion
                    }
                }
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
