<!doctype html>
<html lang="mn" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Liscord — Монгол бизнест зориулсан захиалга, бараа, харилцагчийн бүртгэлийн платформ" />
  <meta name="theme-color" content="#0a0a12" />
  <title>Liscord — Бизнесийн захиалга удирдлага</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    body {
      background: #0a0a12;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    // Stale chunk recovery: auto-reload when old JS chunks fail to load after deploy
    window.addEventListener('error', function (e) {
      if (e.message && e.message.includes('Failed to fetch dynamically imported module') ||
        e.target && e.target.tagName === 'SCRIPT') {
        var key = 'liscord_chunk_reload';
        var last = sessionStorage.getItem(key);
        if (!last || Date.now() - Number(last) > 10000) {
          sessionStorage.setItem(key, Date.now().toString());
          window.location.reload();
        }
      }
    }, true);
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
