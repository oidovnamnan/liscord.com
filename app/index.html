      background: #0a0a12;
    }

  <!-- Storefront: force white background BEFORE React loads (fixes FB browser black screen) -->
  <script>
    (function() {
      var p = location.pathname;
      // If path is NOT /app, /login, /register, /super, / — it's a storefront slug
      var isStore = p.length > 1 && !/^\/(app|login|register|super)(\/?|$)/i.test(p);
      if (isStore) {
        document.documentElement.setAttribute('data-theme', 'light');
        document.documentElement.style.colorScheme = 'light';
        var s = document.createElement('style');
        s.textContent = 'body{background:#fff!important;color:#111!important}';
        document.head.appendChild(s);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script>
    // ═══ Stale Chunk Recovery (Pre-React) ═══
    // After Vercel deploys new code, old hashed JS chunks are deleted.
    // If a user has a stale tab, the entry-point module script fails to load.
    // This script properly cleans SW caches THEN reloads with cache-busting.
    (function() {
      var RELOAD_KEY = 'liscord_chunk_reload';
      var COUNT_KEY = 'liscord_chunk_count';
      var COOLDOWN_MS = 15000; // 15 seconds between reloads
      var MAX_RETRIES = 3;     // Max 3 reload attempts then show error
      var reloading = false;

      function shouldReload() {
        try {
          var count = parseInt(sessionStorage.getItem(COUNT_KEY) || '0');
          if (count >= MAX_RETRIES) return false; // Stop infinite loops
          var last = sessionStorage.getItem(RELOAD_KEY);
          return !last || (Date.now() - Number(last)) > COOLDOWN_MS;
        } catch(e) { return false; } // sessionStorage unavailable (private mode)
      }

      function showError() {
        var root = document.getElementById('root');
        if (root) root.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:system-ui;text-align:center;padding:20px;background:#0a0a12"><div style="font-size:3rem;margin-bottom:16px">🔄</div><h2 style="font-size:1.2rem;margin-bottom:8px">Шинэчлэгдлээ</h2><p style="color:#888;max-width:320px;margin-bottom:20px">Liscord шинэ хувилбар суулаа. Хуудсыг дахин ачаална уу.</p><button onclick="sessionStorage.clear();location.href=location.pathname" style="padding:12px 32px;background:#6c5ce7;color:#fff;border:none;border-radius:12px;font-size:0.9rem;font-weight:700;cursor:pointer">Дахин ачаалах</button></div>';
      }

      function doReload() {
        if (reloading) return;
        if (!shouldReload()) { showError(); return; }
        reloading = true;

        try {
          var count = parseInt(sessionStorage.getItem(COUNT_KEY) || '0');
          sessionStorage.setItem(COUNT_KEY, (count + 1).toString());
          sessionStorage.setItem(RELOAD_KEY, Date.now().toString());
        } catch(e) {}

        // Step 1: Clean ALL caches and unregister ALL service workers
        var tasks = [];
        if ('caches' in window) {
          tasks.push(caches.keys().then(function(names) {
            return Promise.all(names.map(function(n) { return caches.delete(n); }));
          }));
        }
        if ('serviceWorker' in navigator) {
          tasks.push(navigator.serviceWorker.getRegistrations().then(function(regs) {
            return Promise.all(regs.map(function(r) { return r.unregister(); }));
          }));
        }

        // Step 2: Wait for cleanup, THEN reload with cache-busting param
        Promise.all(tasks).catch(function(){}).then(function() {
          var url = location.pathname + '?v=' + Date.now();
          location.replace(url);
        });
      }

      // 1. Catch module script load errors (capture phase)
      window.addEventListener('error', function(e) {
        var el = e.target || e.srcElement;
        if (el && (el.tagName === 'SCRIPT' || el.tagName === 'LINK')) {
          doReload();
        }
        if (e.message && (
          e.message.indexOf('Failed to fetch dynamically imported module') !== -1 ||
          e.message.indexOf('Loading chunk') !== -1 ||
          e.message.indexOf('text/html') !== -1 ||
          e.message.indexOf('Failed to load module script') !== -1
        )) {
          doReload();
        }
      }, true);

      // 2. Catch dynamic import() rejections (lazy-loaded routes)
      window.addEventListener('unhandledrejection', function(e) {
        var reason = (e.reason && e.reason.message) ? e.reason.message : String(e.reason || '');
        if (
          reason.indexOf('Failed to fetch dynamically imported module') !== -1 ||
          reason.indexOf('Loading chunk') !== -1 ||
          reason.indexOf('text/html') !== -1 ||
          reason.indexOf('Load failed') !== -1
        ) {
          doReload();
        }
      });

      // 3. Vite-specific preload error
      window.addEventListener('vite:preloadError', function() {
        doReload();
      });

      // 4. Render timeout — if app doesn't render within 8 seconds, reload
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          doReload();
        }
      }, 8000);

      // 5. Clear reload counter on successful boot
      window.addEventListener('load', function() {
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            try { sessionStorage.removeItem(COUNT_KEY); } catch(e) {}
          }
        }, 3000);
      });
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
