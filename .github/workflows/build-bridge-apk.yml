name: Build Liscord Bridge APK

on:
  push:
    branches:
      - main
    paths:
      - 'liscordbridge/**'
      - '.github/workflows/build-bridge-apk.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'liscordbridge/package-lock.json'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        working-directory: ./liscordbridge
        run: npm ci

      - name: Decode Release Keystore
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > liscordbridge/android/app/release.keystore

      - name: Build Android Release APK
        working-directory: ./liscordbridge/android
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          chmod +x ./gradlew
          if [ -f app/release.keystore ]; then
            echo "Building with release keystore..."
            ./gradlew assembleRelease -x lint --no-daemon --stacktrace \
              -Dorg.gradle.jvmargs="-Xmx4g" \
              -PRELEASE_STORE_FILE=release.keystore \
              -PRELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }} \
              -PRELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }} \
              -PRELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}
          else
            echo "No release keystore found, building with debug keystore..."
            ./gradlew assembleRelease -x lint --no-daemon --stacktrace \
              -Dorg.gradle.jvmargs="-Xmx4g"
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LiscordBridge-app-release
          path: liscordbridge/android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success() && github.ref == 'refs/heads/main'
        with:
          tag_name: bridge-v${{ github.run_number }}
          name: Liscord Bridge v1.0.${{ github.run_number }}
          files: liscordbridge/android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
