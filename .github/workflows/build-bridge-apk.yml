name: Build Liscord Bridge APK

on:
  push:
    branches:
      - main
    paths:
      - 'liscordbridge/**'
      - '.github/workflows/build-bridge-apk.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'liscordbridge/package-lock.json'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        working-directory: ./liscordbridge
        run: npm ci

      - name: Build Android Release APK
        working-directory: ./liscordbridge/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -x lint --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LiscordBridge-app-release
          path: liscordbridge/android/app/build/outputs/apk/release/app-release.apk

      # Delete old 'bridge-latest' release & tag so we can recreate it
      - name: Delete old bridge-latest release
        if: success() && github.ref == 'refs/heads/main'
        run: |
          gh release delete bridge-latest --yes 2>/dev/null || true
          git push --delete origin bridge-latest 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create/overwrite the stable 'bridge-latest' release
      - name: Create Release (bridge-latest)
        uses: softprops/action-gh-release@v1
        if: success() && github.ref == 'refs/heads/main'
        with:
          tag_name: bridge-latest
          name: "Liscord Bridge — Хамгийн сүүлийн хувилбар"
          body: |
            **Автоматаар бүйлд хийгдсэн APK**
            
            Commit: ${{ github.sha }}
            Огноо: ${{ github.event.head_commit.timestamp }}
            
            Шинэчлэлтүүд:
            - ${{ github.event.head_commit.message }}
          files: liscordbridge/android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
