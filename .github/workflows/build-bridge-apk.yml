name: Build Liscord Bridge APK

on:
  push:
    branches:
      - main
    paths:
      - 'liscordbridge/**'
      - '.github/workflows/build-bridge-apk.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'liscordbridge/package-lock.json'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        working-directory: ./liscordbridge
        run: npm ci

      - name: Build Android Release APK
        working-directory: ./liscordbridge/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -x lint > build.log 2>&1 || (cp build.log ../../build_error.log && exit 1)

      - name: Push execution logs
        if: failure()
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git pull --rebase origin main || true
          git add build_error.log
          git commit -m "ci: append build failure logs [skip ci]" || echo "No changes"
          git push origin main

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/heads/main')
        with:
          tag_name: bridge-latest
          name: Liscord Bridge Latest
          files: liscordbridge/android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
